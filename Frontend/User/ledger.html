<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rent Ledger — RentProx</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:#28b446; --green-dark:#1e8c36;
      --bg:#f8f9fa; --white:#fff;
      --text:#1a1d23; --muted:#666;
      --border:#ededed; --shadow:0 4px 20px rgba(0,0,0,0.07);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); display:flex; height:100vh; overflow:hidden; }

    /* SIDEBAR */
    .sidebar-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; }
    .sidebar{ width:260px; background:#fff; border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 0; z-index:1001; flex-shrink:0; }
    .sidebar-logo{ padding:0 24px 30px; font-weight:800; color:var(--green); font-size:1.4rem; cursor:pointer; }
    .nav-group{ flex:1; overflow-y:auto; }
    .nav-link{ display:flex; align-items:center; gap:12px; padding:12px 24px; text-decoration:none; color:var(--muted); font-weight:500; font-size:0.95rem; }
    .nav-link:hover{ color:var(--green); background:#f0fdf4; }
    .nav-link.active{ color:var(--green); background:#e8f5e9; border-right:4px solid var(--green); font-weight:700; }
    .sidebar-footer{ padding:20px; border-top:1px solid var(--border); margin-top:auto; }
    .btn-logout-side{ width:100%; padding:12px; background:#fff; border:1px solid var(--border); border-radius:8px; font-weight:600; cursor:pointer; color:var(--muted); font-family:inherit; }
    .btn-logout-side:hover{ color:#ef4444; border-color:#ef4444; }

    /* TOPBAR */
    .main-wrap{ flex:1; display:flex; flex-direction:column; overflow-y:auto; }
    .topbar{ height:68px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 36px; position:sticky; top:0; z-index:90; }
    .menu-toggle{ display:none; background:none; border:none; font-size:1.5rem; cursor:pointer; color:#333; margin-right:15px; }
    .prof-wrap{ position:relative; }
    .prof-pill{ display:flex; align-items:center; gap:10px; padding:6px 6px 6px 16px; border:1.5px solid var(--green); border-radius:30px; cursor:pointer; }
    .prof-pill span{ color:var(--green); font-weight:600; font-size:0.88rem; }
    .prof-av{ width:30px; height:30px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; }
    .prof-drop{ position:absolute; top:calc(100% + 8px); right:0; width:240px; background:#fff; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.12); border:1px solid var(--border); display:none; flex-direction:column; z-index:999; overflow:hidden; }
    .prof-drop.on{ display:flex; }
    .drop-hd{ padding:16px 18px; border-bottom:1px solid #f5f5f5; }
    .drop-name{ font-weight:700; font-size:0.9rem; }
    .drop-email{ font-size:0.73rem; color:var(--muted); }
    .drop-item{ padding:12px 18px; color:var(--muted); font-size:0.87rem; font-weight:500; cursor:pointer; }
    .drop-item.red{ color:#ef4444; border-top:1px solid #f5f5f5; }

    /* CONTENT */
    .content{ padding:32px 36px; }
    .page-head{ margin-bottom:28px; }
    .page-head h1{ font-size:1.5rem; font-weight:700; }
    .page-head p{ color:var(--muted); margin-top:4px; font-size:0.9rem; }

    /* ROLE TABS */
    .role-tabs{ display:flex; gap:4px; margin-bottom:28px; background:#f1f5f9; border-radius:10px; padding:4px; width:fit-content; }
    .role-tab{ padding:9px 24px; border-radius:7px; font-weight:600; font-size:0.88rem; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:inherit; }
    .role-tab.active{ background:#fff; color:var(--text); box-shadow:0 2px 6px rgba(0,0,0,0.08); }

    /* PROPERTY BLOCK */
    .prop-block{ background:#fff; border:1px solid var(--border); border-radius:14px; margin-bottom:24px; overflow:hidden; box-shadow:var(--shadow); }
    .prop-header{ padding:18px 24px; background:#f8fafc; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .prop-title{ font-weight:700; font-size:1rem; }
    .prop-meta{ color:var(--muted); font-size:0.82rem; margin-top:2px; }
    .prop-rent-badge{ background:#e8f5e9; color:var(--green); padding:5px 12px; border-radius:6px; font-size:0.78rem; font-weight:700; }

    /* SECTION INSIDE BLOCK */
    .pay-section{ padding:20px 24px; border-bottom:1px solid #f5f5f5; }
    .pay-section:last-child{ border-bottom:none; }
    .sec-label{ font-size:0.75rem; font-weight:700; text-transform:uppercase; color:var(--muted); letter-spacing:0.5px; margin-bottom:14px; }

    /* PAYMENT ROW */
    .pay-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f9f9f9; gap:12px; flex-wrap:wrap; }
    .pay-row:last-child{ border-bottom:none; }
    .pay-row-left{ display:flex; align-items:center; gap:12px; }
    .pay-icon{ width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
    .pay-icon.security{ background:#e8f5e9; }
    .pay-icon.monthly{ background:#eff6ff; }
    .pay-icon.pending-pay{ background:#fff7ed; }
    .pay-label{ font-weight:600; font-size:0.9rem; }
    .pay-sub{ font-size:0.76rem; color:var(--muted); margin-top:2px; }
    .pay-amount{ font-weight:700; font-size:0.95rem; }

    /* BADGES */
    .badge{ padding:5px 11px; border-radius:6px; font-size:0.71rem; font-weight:700; text-transform:uppercase; white-space:nowrap; }
    .b-verified  { background:#e8f5e9; color:var(--green); }
    .b-pending   { background:#fff7ed; color:#c2410c; }
    .b-rejected  { background:#fff5f5; color:#ef4444; }

    /* VERIFY BUTTONS */
    .btn-verify{ padding:7px 14px; background:var(--green); color:#fff; border:none; border-radius:7px; font-weight:700; cursor:pointer; font-size:0.78rem; font-family:inherit; }
    .btn-verify:hover{ background:var(--green-dark); }
    .btn-reject-pay{ padding:7px 12px; background:#fff; color:#ef4444; border:1.5px solid #fca5a5; border-radius:7px; font-weight:600; cursor:pointer; font-size:0.78rem; font-family:inherit; margin-left:6px; }

    /* TENANT SUBMIT FORM */
    .submit-form{ background:#f0fdf4; border:1.5px solid #86efac; border-radius:12px; padding:18px 20px; margin-top:14px; }
    .submit-form h4{ font-size:0.9rem; color:var(--green); margin-bottom:12px; }
    .submit-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .submit-input{ flex:1; min-width:200px; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.88rem; outline:none; }
    .submit-input:focus{ border-color:var(--green); }
    .btn-submit-pay{ padding:10px 20px; background:var(--green); color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .btn-submit-pay:hover{ background:var(--green-dark); }
    .btn-submit-pay:disabled{ background:#94a3b8; cursor:not-allowed; }

    /* SKELETON */
    .sk{ background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:sh 1.4s infinite; border-radius:10px; }
    @keyframes sh{ 0%{background-position:200% 0}100%{background-position:-200% 0} }
    .empty-state{ text-align:center; padding:50px; color:var(--muted); }
    .empty-state h3{ margin-bottom:8px; color:var(--text); }

    /* TXNID display */
    .txn-chip{ display:inline-block; font-size:0.72rem; background:#f1f5f9; color:#475569; padding:3px 8px; border-radius:4px; font-family:monospace; margin-top:3px; }

    @media(max-width:768px){
      .sidebar{ position:fixed; left:-100%; top:0; height:100%; transition:left 0.3s ease; }
      .sidebar.active{ left:0; }
      .sidebar-overlay.active{ display:block; }
      .menu-toggle{ display:block; }
      .content{ padding:20px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo" onclick="location.href='../index.html'">RentProx</div>
  <div class="nav-group">
    <a href="../homepage.html" class="nav-link">🔍 Browse Properties</a>
    <a href="my_requests.html" class="nav-link">📋 My Requests</a>
    <a href="my_rental.html"   class="nav-link">🏡 My Rental</a>
    <a href="incoming_requests.html" class="nav-link">📩 Incoming Requests</a>
    <a href="addproperty.html" class="nav-link">➕ Add Property</a>
    <a href="properties.html"  class="nav-link">🏢 Property Management</a>
    <a href="ledger.html"      class="nav-link active">💰 Rent Ledger</a>
  </div>
  <div class="sidebar-footer">
    <button class="btn-logout-side" id="logout-btn">Log Out</button>
  </div>
</nav>

<div class="main-wrap">
  <header class="topbar">
    <div style="display:flex;align-items:center">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <span style="font-weight:700;color:var(--muted)">Rent Ledger</span>
    </div>
    <div class="prof-wrap">
      <div class="prof-pill" id="prof-pill">
        <span class="js-user-name">…</span>
        <div class="prof-av">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>
      <div class="prof-drop" id="prof-drop">
        <div class="drop-hd">
          <div class="drop-name js-user-name">—</div>
          <div class="drop-email js-user-email">—</div>
        </div>
        <div class="drop-item red" id="logout-drop">Logout</div>
      </div>
    </div>
  </header>

  <div class="content">
    <div class="page-head">
      <h1>💰 Rent Ledger</h1>
      <p>Security deposit aur monthly rent payments ka poora record.</p>
    </div>

    <!-- ROLE TABS -->
    <div class="role-tabs">
      <button class="role-tab active" id="tab-owner" onclick="switchRole('owner',this)">🏠 As Owner</button>
      <button class="role-tab"        id="tab-tenant" onclick="switchRole('tenant',this)">🧑 As Tenant</button>
    </div>

    <!-- CONTENT AREA -->
    <div id="ledger-content">
      <div class="sk" style="height:120px;margin-bottom:16px"></div>
      <div class="sk" style="height:120px;margin-bottom:16px"></div>
    </div>
  </div>
</div>

<script src="../api.js"></script>
<script>
let currentRole = 'owner';
let ownerData   = null;
let tenantData  = null;

(async function init(){
  const user = await Auth.guard('../login_plm.html');
  if(!user) return;
  Auth.fillProfile();

  document.getElementById('logout-btn').onclick  = ()=>Auth.logout('../login_plm.html');
  document.getElementById('logout-drop').onclick = ()=>Auth.logout('../login_plm.html');

  const pill=document.getElementById('prof-pill'), drop=document.getElementById('prof-drop');
  pill.addEventListener('click',e=>{ e.stopPropagation(); drop.classList.toggle('on'); });
  window.addEventListener('click',()=>drop.classList.remove('on'));

  const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('sidebar-overlay');
  document.getElementById('menu-toggle').onclick  = ()=>{ sidebar.classList.add('active');    overlay.classList.add('active'); };
  overlay.onclick = ()=>{ sidebar.classList.remove('active'); overlay.classList.remove('active'); };

  await loadOwner();
})();

// ── ROLE SWITCH ───────────────────────────────────────
async function switchRole(role, el){
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(role==='owner'){
    if(!ownerData) await loadOwner();
    else renderOwner();
  } else {
    if(!tenantData) await loadTenant();
    else renderTenant();
  }
}

// ── OWNER ─────────────────────────────────────────────
async function loadOwner(){
  showSkeleton();
  try{
    const d = await apiFetch('/owner/ledger');
    if(!d.success){ showEmpty('Data load nahi hua.'); return; }
    ownerData = d.data || [];
    renderOwner();
  } catch { showEmpty('Network error.'); }
}

function renderOwner(){
  const wrap = document.getElementById('ledger-content');
  if(!ownerData.length){
    wrap.innerHTML = '<div class="empty-state"><h3>Koi active rental nahi</h3><p>Kisi tenant ki request accept karein aur agreement activate ho jaane ke baad yahan payments nazar ayengi.</p></div>';
    return;
  }

  wrap.innerHTML = ownerData.map(item => {
    const sp     = item.securityPayment;
    const mps    = item.monthlyPayments || [];
    const totalVerified = mps.filter(p=>p.status==='VERIFIED').reduce((s,p)=>s+p.amount,0)
                        + (sp?.status==='VERIFIED' ? sp.amount : 0);

    return `
    <div class="prop-block">
      <div class="prop-header">
        <div>
          <div class="prop-title">🏠 ${item.property.address}, ${item.property.city}</div>
          <div class="prop-meta">Tenant: <strong>${item.tenant.name}</strong> · ${item.tenant.phone}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="prop-rent-badge">PKR ${item.agreement.monthlyRent.toLocaleString()}/mo</span>
          <span style="font-size:0.78rem;color:var(--muted)">Total Collected: <strong style="color:var(--green)">PKR ${totalVerified.toLocaleString()}</strong></span>
        </div>
      </div>

      <!-- SECURITY DEPOSIT -->
      <div class="pay-section">
        <div class="sec-label">🔐 Security Deposit</div>
        ${sp ? `
        <div class="pay-row">
          <div class="pay-row-left">
            <div class="pay-icon security">🔐</div>
            <div>
              <div class="pay-label">Security Deposit</div>
              <div class="txn-chip">${sp.transactionId}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="pay-amount">PKR ${sp.amount.toLocaleString()}</span>
            <span class="badge b-${sp.status==='VERIFIED'?'verified':sp.status==='REJECTED'?'rejected':'pending'}">${sp.status.replace('_',' ')}</span>
            ${sp.status==='PENDING_VERIFICATION' ? `
              <button class="btn-verify" data-spid="${sp.id}" data-agid="${item.agreement.id}" onclick="ownerVerifySecurity(this)">✅ Verify</button>
              <button class="btn-reject-pay" data-spid="${sp.id}" data-agid="${item.agreement.id}" onclick="ownerRejectSecurity(this)">❌ Reject</button>
            ` : ''}
          </div>
        </div>` : '<div style="color:var(--muted);font-size:0.85rem;padding:8px 0">Security deposit abhi submit nahi ki gayi.</div>'}
      </div>

      <!-- MONTHLY PAYMENTS -->
      <div class="pay-section">
        <div class="sec-label">📅 Monthly Rent Payments</div>
        ${mps.length ? mps.map(p=>`
        <div class="pay-row">
          <div class="pay-row-left">
            <div class="pay-icon monthly">📅</div>
            <div>
              <div class="pay-label">${p.month}</div>
              <div class="txn-chip">${p.transactionId}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="pay-amount">PKR ${p.amount.toLocaleString()}</span>
            <span class="badge b-${p.status==='VERIFIED'?'verified':p.status==='REJECTED'?'rejected':'pending'}">${p.status.replace('_',' ')}</span>
            ${p.status==='PENDING_VERIFICATION' ? `
              <button class="btn-verify" data-pid="${p.id}" onclick="ownerVerifyMonthly(this)">✅ Verify</button>
              <button class="btn-reject-pay" data-pid="${p.id}" onclick="ownerRejectMonthly(this)">❌ Reject</button>
            ` : ''}
          </div>
        </div>`).join('') : '<div style="color:var(--muted);font-size:0.85rem;padding:8px 0">Abhi koi monthly payment nahi aayi.</div>'}
      </div>
    </div>`;
  }).join('');
}

// Owner verify/reject security deposit
async function ownerVerifySecurity(btn){
  const agId = btn.dataset.agid;
  if(!confirm('Security deposit verify karein?')) return;
  try{
    const d = await apiFetch(`/user/agreement/${agId}/verify`,{ method:'PUT', body:JSON.stringify({ action:'verify' }) });
    if(d.success){ showToast(d.message); ownerData=null; await loadOwner(); }
    else showToast(d.message||'Error.','error');
  } catch { showToast('Network error.','error'); }
}

async function ownerRejectSecurity(btn){
  const agId   = btn.dataset.agid;
  const reason = prompt('Rejection reason:') || '';
  if(!reason.trim()){ showToast('Reason zaruri hai.','error'); return; }
  try{
    const d = await apiFetch(`/user/agreement/${agId}/verify`,{ method:'PUT', body:JSON.stringify({ action:'reject', rejectedReason:reason }) });
    if(d.success){ showToast(d.message); ownerData=null; await loadOwner(); }
    else showToast(d.message||'Error.','error');
  } catch { showToast('Network error.','error'); }
}

// Owner verify/reject monthly payment
async function ownerVerifyMonthly(btn){
  const pid = btn.dataset.pid;
  if(!confirm('Monthly payment verify karein?')) return;
  try{
    const d = await apiFetch(`/owner/ledger/${pid}/verify`,{ method:'PUT' });
    if(d.success){ showToast(d.message); ownerData=null; await loadOwner(); }
    else showToast(d.message||'Error.','error');
  } catch { showToast('Network error.','error'); }
}

async function ownerRejectMonthly(btn){
  const pid    = btn.dataset.pid;
  const reason = prompt('Rejection reason:') || '';
  if(!reason.trim()){ showToast('Reason zaruri hai.','error'); return; }
  try{
    const d = await apiFetch(`/owner/ledger/${pid}/reject`,{ method:'PUT', body:JSON.stringify({ reason }) });
    if(d.success){ showToast(d.message); ownerData=null; await loadOwner(); }
    else showToast(d.message||'Error.','error');
  } catch { showToast('Network error.','error'); }
}

// ── TENANT ────────────────────────────────────────────
async function loadTenant(){
  showSkeleton();
  try{
    const d = await apiFetch('/user/ledger');
    if(!d.success){ showEmpty('Data load nahi hua.'); return; }
    tenantData = d.data || null;
    renderTenant();
  } catch { showEmpty('Network error.'); }
}

function renderTenant(){
  const wrap = document.getElementById('ledger-content');
  if(!tenantData || !tenantData.property){
    wrap.innerHTML = '<div class="empty-state"><h3>Koi active rental nahi</h3><p>Agreement active hone ke baad yahan payments nazar ayengi.</p></div>';
    return;
  }

  const d   = tenantData;
  const sp  = d.securityPayment;
  const mps = d.monthlyPayments || [];

  const totalVerified = mps.filter(p=>p.status==='VERIFIED').reduce((s,p)=>s+p.amount,0)
                      + (sp?.status==='VERIFIED' ? sp.amount : 0);
  const totalPending  = mps.filter(p=>p.status==='PENDING_VERIFICATION').reduce((s,p)=>s+p.amount,0)
                      + (sp?.status==='PENDING_VERIFICATION' ? sp.amount : 0);

  // Find last rejected monthly payment for resubmit
  const lastRejected = [...mps].reverse().find(p=>p.status==='REJECTED');

  wrap.innerHTML = `
  <div class="prop-block">
    <div class="prop-header">
      <div>
        <div class="prop-title">🏠 ${d.property.address}, ${d.property.city}</div>
        <div class="prop-meta">
          Monthly Rent: <strong>PKR ${d.agreement.monthlyRent.toLocaleString()}</strong>
          &nbsp;·&nbsp; Start: ${new Date(d.agreement.startDate).toLocaleDateString('en-PK')}
          &nbsp;·&nbsp; End: ${new Date(d.agreement.endDate).toLocaleDateString('en-PK')}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:0.78rem;color:var(--muted)">Total Verified: <strong style="color:var(--green)">PKR ${totalVerified.toLocaleString()}</strong></div>
        ${totalPending ? `<div style="font-size:0.75rem;color:#c2410c;margin-top:2px">Pending: PKR ${totalPending.toLocaleString()}</div>` : ''}
      </div>
    </div>

    <!-- SECURITY DEPOSIT -->
    <div class="pay-section">
      <div class="sec-label">🔐 Security Deposit</div>
      ${sp ? `
      <div class="pay-row">
        <div class="pay-row-left">
          <div class="pay-icon security">🔐</div>
          <div>
            <div class="pay-label">Security Deposit — PKR ${sp.amount.toLocaleString()}</div>
            <div class="txn-chip">${sp.transactionId}</div>
            ${sp.status==='REJECTED' && sp.rejectedReason ? `<div style="font-size:0.75rem;color:#ef4444;margin-top:3px">❌ ${sp.rejectedReason}</div>` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="badge b-${sp.status==='VERIFIED'?'verified':sp.status==='REJECTED'?'rejected':'pending'}">${sp.status.replace(/_/g,' ')}</span>
          ${sp.status==='VERIFIED' ? `<span style="font-size:0.72rem;color:var(--muted)">✔ ${sp.verifiedAt ? new Date(sp.verifiedAt).toLocaleDateString('en-PK') : ''}</span>` : ''}
        </div>
      </div>` : `
      <div style="color:var(--muted);font-size:0.85rem;padding:6px 0">
        Security deposit agreement page se submit karein.
      </div>`}
    </div>

    <!-- MONTHLY PAYMENTS -->
    <div class="pay-section">
      <div class="sec-label">📅 Monthly Rent Payments</div>
      ${mps.length ? mps.map(p=>`
      <div class="pay-row">
        <div class="pay-row-left">
          <div class="pay-icon ${p.status==='VERIFIED'?'monthly':p.status==='REJECTED'?'pending-pay':'monthly'}">
            ${p.status==='VERIFIED'?'✅':p.status==='REJECTED'?'❌':'⏳'}
          </div>
          <div>
            <div class="pay-label">${p.month}</div>
            <div class="txn-chip">${p.transactionId}</div>
            ${p.status==='REJECTED' && p.rejectedReason ? `<div style="font-size:0.75rem;color:#ef4444;margin-top:3px">Reason: ${p.rejectedReason}</div>` : ''}
            ${p.status==='VERIFIED' && p.verifiedAt ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:2px">Verified: ${new Date(p.verifiedAt).toLocaleDateString('en-PK')}</div>` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pay-amount">PKR ${p.amount.toLocaleString()}</span>
          <span class="badge b-${p.status==='VERIFIED'?'verified':p.status==='REJECTED'?'rejected':'pending'}">${p.status.replace(/_/g,' ')}</span>
        </div>
      </div>`).join('') : `
      <div style="color:var(--muted);font-size:0.85rem;padding:6px 0">
        Abhi koi monthly payment nahi ki. Neeche form se pehli payment submit karein.
      </div>`}

      <!-- RESUBMIT FORM (agar last payment rejected thi) -->
      ${lastRejected ? `
      <div class="submit-form" style="border-color:#fca5a5;background:#fff5f5;margin-top:14px">
        <h4 style="color:#dc2626">🔄 Rejected Payment Dobara Submit Karein — ${lastRejected.month}</h4>
        <div style="font-size:0.82rem;color:#7f1d1d;margin-bottom:12px">
          Pehli transaction reject ho gayi thi. Naya Transaction ID daal kar dobara submit karein.
        </div>
        <div class="submit-row">
          <input class="submit-input" id="monthly-txn" placeholder="Naya Transaction ID">
          <button class="btn-submit-pay" id="monthly-submit-btn"
            style="background:#dc2626"
            onclick="tenantSubmitMonthly('${d.agreement.id}','${lastRejected.month}',${lastRejected.amount})">
            Resubmit
          </button>
        </div>
      </div>` : d.canSubmitNext ? `
      <!-- NEXT MONTH SUBMIT FORM -->
      <div class="submit-form" style="margin-top:14px">
        <h4>💳 ${mps.length===0 ? 'Pehla Month' : 'Next Month'} Rent Submit Karein — ${d.nextMonth}</h4>
        <div style="font-size:0.82rem;color:var(--muted);margin-bottom:12px">
          Amount: <strong>PKR ${d.agreement.monthlyRent.toLocaleString()}</strong>
          &nbsp;·&nbsp; EasyPaisa / JazzCash / Bank transfer karke Transaction ID yahan dalein
        </div>
        <div class="submit-row">
          <input class="submit-input" id="monthly-txn" placeholder="Transaction ID (e.g. TXN123456789)">
          <button class="btn-submit-pay" id="monthly-submit-btn"
            onclick="tenantSubmitMonthly('${d.agreement.id}','${d.nextMonth}',${d.agreement.monthlyRent})">
            Submit Payment
          </button>
        </div>
      </div>` : `
      <div style="margin-top:12px;padding:12px 16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;font-size:0.84rem;color:#92400e">
        ⏳ Payment verify hone ka intezaar karein, phir next month submit kar sakenge.
      </div>`}
    </div>
  </div>`;
}

async function tenantSubmitMonthly(agreementId, month, amount){
  const txnId = document.getElementById('monthly-txn')?.value?.trim();
  if(!txnId){ showToast('Transaction ID zaruri hai.','error'); return; }
  const btn = document.getElementById('monthly-submit-btn');
  if(btn){ btn.disabled=true; btn.textContent='Submitting...'; }
  try{
    const d = await apiFetch(`/user/ledger/${agreementId}/pay`,{
      method:'POST',
      body: JSON.stringify({ transactionId:txnId, month, amount })
    });
    if(d.success){ showToast(d.message); tenantData=null; await loadTenant(); }
    else{ showToast(d.message||'Submit nahi hua.','error'); if(btn){ btn.disabled=false; btn.textContent='Submit Payment'; } }
  } catch { showToast('Network error.','error'); if(btn){ btn.disabled=false; btn.textContent='Submit Payment'; } }
}

// ── UTILS ─────────────────────────────────────────────
function showSkeleton(){
  document.getElementById('ledger-content').innerHTML =
    '<div class="sk" style="height:140px;margin-bottom:16px"></div>' +
    '<div class="sk" style="height:140px"></div>';
}
function showEmpty(msg){
  document.getElementById('ledger-content').innerHTML =
    `<div class="empty-state"><h3>${msg}</h3></div>`;
}
</script>
