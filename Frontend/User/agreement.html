<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rental Agreement — RentProx</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --green:#28b446; --green-dark:#1e8c36;
      --bg:#f8f9fa; --white:#fff;
      --text:#1a1d23; --muted:#666;
      --border:#ededed; --shadow:0 4px 20px rgba(0,0,0,0.07);
      
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); display:flex; height:100vh; overflow:hidden; }

    
    
    
    
    
    
    
    
    

    /* MAIN */
    .main-wrap{ flex:1; display:flex; flex-direction:column; overflow-y:auto; }
    .topbar{ height:68px; background:var(--white); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 36px; position:sticky; top:0; z-index:90; }

    .prof-wrap{ position:relative; }
    .prof-pill{ display:flex; align-items:center; gap:10px; padding:6px 6px 6px 16px; border:1.5px solid var(--green); border-radius:30px; cursor:pointer; }
    .prof-pill span{ color:var(--green); font-weight:600; font-size:0.88rem; }
    .prof-av{ width:30px; height:30px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; }
    .prof-drop{ position:absolute; top:calc(100% + 8px); right:0; width:240px; background:var(--white); border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.12); border:1px solid var(--border); display:none; flex-direction:column; z-index:999; overflow:hidden; }
    .prof-drop.on{ display:flex; }
    .drop-hd{ padding:16px 18px; border-bottom:1px solid #f5f5f5; }
    .drop-name{ font-weight:700; font-size:0.9rem; }
    .drop-email{ font-size:0.73rem; color:var(--muted); }
    .drop-item{ padding:12px 18px; color:var(--muted); font-size:0.87rem; font-weight:500; }
    .drop-item.red{ color:#ef4444; border-top:1px solid #f5f5f5; cursor:pointer; }

    /* CONTENT */
    .content{ padding:32px; max-width:860px; }

    /* AGREEMENT HEADER */
    .agr-header{
      background:var(--white); border:1px solid var(--border);
      border-radius:14px; padding:26px 30px; margin-bottom:20px; box-shadow:var(--shadow);
    }
    .agr-title{ font-size:1.4rem; font-weight:800; margin-bottom:6px; }
    .agr-sub{ color:var(--muted); font-size:0.88rem; margin-bottom:18px; }
    .status-row{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .agr-badge{ padding:6px 14px; border-radius:7px; font-size:0.75rem; font-weight:700; text-transform:uppercase; }
    .b-draft    { background:#fff7ed; color:#c2410c; }
    .b-active   { background:#e8f5e9; color:var(--green); }
    .b-expired  { background:#f5f5f5; color:#94a3b8; }
    .b-cancelled{ background:#fff5f5; color:#ef4444; }
    .sign-pill{ display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:7px; background:#f1f5f9; color:#64748b; font-size:0.78rem; font-weight:600; }
    .sign-pill.done{ background:#e8f5e9; color:var(--green); }

    /* SECTION */
    .section{ background:var(--white); border:1px solid var(--border); border-radius:12px; padding:22px 26px; margin-bottom:18px; box-shadow:var(--shadow); }
    .sec-title{ font-weight:700; font-size:0.92rem; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
    .sec-num{ width:22px; height:22px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:800; flex-shrink:0; }
    .terms-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .ti{ display:flex; flex-direction:column; gap:3px; }
    .tl{ font-size:0.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; }
    .tv{ font-weight:700; font-size:0.92rem; }
    .tv.hi{ color:var(--green); font-size:1.05rem; }
    .bool-row{ display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f9f9f9; font-size:0.87rem; }
    .bool-row:last-child{ border:none; }
    .chip{ padding:3px 9px; border-radius:5px; font-size:0.7rem; font-weight:700; }
    .chip.y{ background:#e8f5e9; color:var(--green); }
    .chip.n{ background:#f5f5f5; color:#94a3b8; }

    /* EDIT FORM */
    .edit-section{ display:none; margin-top:16px; padding-top:16px; border-top:1px dashed var(--border); }
    .edit-section.on{ display:block; }
    .fg{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
    .fgi{ display:flex; flex-direction:column; gap:5px; }
    .fgl{ font-size:0.76rem; font-weight:600; color:var(--muted); }
    .fginput{ padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-family:inherit; outline:none; font-size:0.86rem; }
    .fginput:focus{ border-color:var(--green); }
    .fcheck{ display:flex; align-items:center; gap:8px; font-size:0.86rem; cursor:pointer; }
    .fchecks{ display:flex; gap:20px; flex-wrap:wrap; margin-bottom:12px; }

    /* ACTION BAR */
    .action-bar{
      background:var(--white); border:1px solid var(--border);
      border-radius:12px; padding:20px 26px; display:flex;
      align-items:flex-start; justify-content:space-between; gap:20px; box-shadow:var(--shadow);
      margin-bottom:18px;
    }
    .action-bar.green-bg{ background:#f0fdf4; border-color:#86efac; }
    .action-left strong{ display:block; margin-bottom:4px; }
    .action-left p{ font-size:0.85rem; color:var(--muted); }
    .abtns{ display:flex; gap:10px; flex-wrap:wrap; flex-shrink:0; }
    .btn-edit{ padding:10px 20px; border:1.5px solid var(--green); color:var(--green); background:var(--white); border-radius:8px; font-weight:700; cursor:pointer; font-family:inherit; font-size:0.85rem; }
    .btn-sign{ padding:10px 22px; background:var(--green); color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-family:inherit; font-size:0.85rem; }
    .btn-sign:hover{ background:var(--green-dark); }
    .btn-sign:disabled{ background:#94a3b8; cursor:not-allowed; }
    .btn-danger{ padding:10px 20px; background:#ef4444; color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-family:inherit; font-size:0.85rem; }

    /* PAYMENT SECTION */
    .pay-box{
      background:var(--white); border:2px solid var(--green);
      border-radius:14px; padding:26px; margin-bottom:18px; box-shadow:var(--shadow);
    }
    .pay-box h3{ font-size:1.05rem; margin-bottom:6px; color:var(--green); }
    .pay-box p{ font-size:0.85rem; color:var(--muted); margin-bottom:18px; }
    .pay-amount-box{
      background:#f0fdf4; border-radius:10px; padding:16px 20px;
      display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;
    }
    .pay-amount-box .lbl{ font-size:0.8rem; color:var(--muted); }
    .pay-amount-box .val{ font-size:1.25rem; font-weight:800; color:var(--green); }
    .pay-input-row{ display:flex; gap:10px; }
    .pay-input{ flex:1; padding:12px 14px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.9rem; outline:none; }
    .pay-input:focus{ border-color:var(--green); }
    .btn-pay{ padding:12px 24px; background:var(--green); color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .btn-pay:hover{ background:var(--green-dark); }
    .btn-pay:disabled{ background:#94a3b8; cursor:not-allowed; }

    /* PAYMENT STATUS BADGE */
    .pay-status{ padding:14px 20px; border-radius:10px; display:flex; align-items:center; gap:12px; }
    .pay-status.pending{ background:#fff7ed; border:1px solid #fed7aa; }
    .pay-status.verified{ background:#e8f5e9; border:1px solid #86efac; }
    .pay-status.rejected{ background:#fff5f5; border:1px solid #fecaca; }
    .pay-status-icon{ font-size:1.5rem; }
    .pay-status-text strong{ display:block; font-size:0.92rem; }
    .pay-status-text span{ font-size:0.82rem; color:var(--muted); }

    /* OWNER VERIFY BOX */
    .verify-box{ background:#fff7ed; border:1.5px solid #fed7aa; border-radius:12px; padding:22px 26px; margin-bottom:18px; }
    .verify-box h3{ font-size:1rem; margin-bottom:6px; color:#92400e; }
    .verify-info{ background:#fff; border-radius:8px; padding:14px 16px; margin-bottom:16px; }
    .vi-row{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #f5f5f5; font-size:0.87rem; }
    .vi-row:last-child{ border:none; }
    .vi-lbl{ color:var(--muted); }
    .vi-val{ font-weight:700; }
    .verify-btns{ display:flex; gap:10px; }
    .btn-verify{ flex:1; padding:11px; background:var(--green); color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-verify:hover{ background:var(--green-dark); }
    .reject-input{ width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; font-family:inherit; margin-bottom:10px; outline:none; font-size:0.86rem; display:none; }
    .reject-input.on{ display:block; }
    .btn-reject{ flex:1; padding:11px; background:var(--white); color:#ef4444; border:1.5px solid #ef4444; border-radius:8px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-reject:hover{ background:#fff5f5; }

    /* SKELETON */
    .sk{ background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:sh 1.4s infinite; border-radius:12px; }
    @keyframes sh{ 0%{background-position:200% 0}100%{background-position:-200% 0} }
    .err-box{ background:#fff5f5; border:1px solid #fecaca; border-radius:10px; padding:24px; text-align:center; color:#ef4444; }
  
    /* ── SIDEBAR & OVERLAY ── */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; }
    .sidebar { width: 260px; background: #fff; border-right: 1px solid #ededed; display: flex; flex-direction: column; padding: 20px 0; z-index: 1001; flex-shrink: 0; }
    .sidebar-logo { padding: 0 24px 30px; font-weight: 800; color: #28b446; font-size: 1.4rem; cursor: pointer; }
    .nav-group { flex: 1; overflow-y: auto; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 24px; text-decoration: none; color: #666; font-weight: 500; font-size: 0.95rem; cursor: pointer; }
    .nav-link:hover { color: #28b446; background: #f0fdf4; }
    .nav-link.active { color: #28b446; background: #e8f5e9; border-right: 4px solid #28b446; font-weight: 700; }
    .sidebar-footer { padding: 20px; border-top: 1px solid #ededed; margin-top: auto; }
    .btn-logout-side { width: 100%; padding: 12px; background: #fff; border: 1px solid #ededed; border-radius: 8px; font-weight: 600; cursor: pointer; color: #666; font-family: inherit; }
    .btn-logout-side:hover { color: #ef4444; border-color: #ef4444; }
    /* ── MENU TOGGLE ── */
    .menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #333; margin-right: 15px; padding: 0; line-height: 1; }
    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -100%; top: 0; height: 100%; transition: left 0.3s ease; }
      .sidebar.active { left: 0; }
      .sidebar-overlay.active { display: block; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo" onclick="location.href='../index.html'">RentProx</div>
    <div class="nav-group">
      <a href="homepage.html" class="nav-link">🏠 Dashboard</a>
      <a href="../index.html" class="nav-link">🔍 Browse Properties</a>
      <a href="my_requests.html" class="nav-link">📋 My Requests</a>
      <a href="my_rental.html" class="nav-link">🏡 My Rental</a>
      <a href="incoming_requests.html" class="nav-link">📩 Incoming Requests</a>
      <a href="addproperty.html" class="nav-link">➕ Add Property</a>
      <a href="properties.html" class="nav-link">🏢 Property Management</a>
      <a href="ledger.html" class="nav-link">💰 Rent Ledger</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout-side" id="logout-btn">Log Out</button>
    </div>
  </nav>


<!-- SIDEBAR -->


<div class="main-wrap">
  <header class="topbar">
    <div style="display:flex;align-items:center;">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <span style="font-weight:700;color:var(--muted)">Rental Agreement</span>
    </div>
    <div class="prof-wrap">
      <div class="prof-pill" id="prof-pill">
        <span class="js-user-name">…</span>
        <div class="prof-av">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>
      <div class="prof-drop" id="prof-drop">
        <div class="drop-hd">
          <div class="drop-name js-user-name">—</div>
          <div class="drop-email js-user-email">—</div>
        </div>
        <div class="drop-item red" id="logout-drop">Logout</div>
      </div>
    </div>
  </header>

  <div class="content" id="main-content">
    <div class="sk" style="height:120px;margin-bottom:18px"></div>
    <div class="sk" style="height:200px;margin-bottom:18px"></div>
    <div class="sk" style="height:120px"></div>
  </div>
</div>

<script src="../api.js"></script>
<script>
let agr = null, prop = null, role = null, spay = null;
let editMode = false;

(async function init(){
  const user = await Auth.guard('../login_plm.html');
  if(!user) return;
  Auth.fillProfile();

  document.getElementById('logout-btn').onclick  = ()=>Auth.logout('../login_plm.html');
  document.getElementById('logout-drop').onclick = ()=>Auth.logout('../login_plm.html');
  const pill=document.getElementById('prof-pill'), drop=document.getElementById('prof-drop');
  pill.addEventListener('click',e=>{e.stopPropagation();drop.classList.toggle('on');});
  window.addEventListener('click',()=>drop.classList.remove('on'));

  const listingId = new URLSearchParams(window.location.search).get('listing');
  if(!listingId){ showErr('Listing ID missing. Wapas jao.'); return; }
  await loadAgreement(listingId);
})();

async function loadAgreement(listingId){
  try{
    const d = await apiFetch(`/user/agreement/${listingId}`);
    if(!d.success){ showErr(d.message); return; }
    agr  = d.data.agreement;
    prop = d.data.property;
    role = d.data.userRole;
    spay = d.data.securityPayment;
    render();
  } catch{ showErr('Agreement load nahi hua.'); }
}

function render(){
  const isActive   = agr.status === 'ACTIVE';
  const bothSigned = agr.tenantSigned && agr.ownerSigned;
  const mySigned   = role==='owner' ? agr.ownerSigned : agr.tenantSigned;

  document.getElementById('main-content').innerHTML = `

    <!-- HEADER -->
    <div class="agr-header">
      <div class="agr-title">Rental Agreement</div>
      <div class="agr-sub">📍 ${prop.address}, ${prop.city}</div>
      <div class="status-row">
        <span class="agr-badge b-${agr.status.toLowerCase()}">${agr.status}</span>
        <div class="sign-pill ${agr.ownerSigned?'done':''}">${agr.ownerSigned?'✅':'⏳'} Owner ${agr.ownerSigned?'Signed':'Pending'}</div>
        <div class="sign-pill ${agr.tenantSigned?'done':''}">${agr.tenantSigned?'✅':'⏳'} Tenant ${agr.tenantSigned?'Signed':'Pending'}</div>
      </div>
    </div>

    <!-- FINANCIAL TERMS -->
    <div class="section">
      <div class="sec-title"><div class="sec-num">1</div> Financial Terms</div>
      <div class="terms-grid">
        <div class="ti"><div class="tl">Monthly Rent</div>     <div class="tv hi">PKR ${agr.monthlyRent.toLocaleString()}</div></div>
        <div class="ti"><div class="tl">Security Deposit</div> <div class="tv">PKR ${agr.securityDeposit.toLocaleString()}</div></div>
        <div class="ti"><div class="tl">Advance Months</div>   <div class="tv">${agr.advanceMonths} month(s)</div></div>
        <div class="ti"><div class="tl">Total Due Now</div>    <div class="tv">PKR ${(agr.securityDeposit + agr.monthlyRent * agr.advanceMonths).toLocaleString()}</div></div>
      </div>

      ${role==='owner' && !isActive ? `
      <div style="margin-top:14px">
        <button class="btn-edit" onclick="toggleEdit()">✏️ Edit Terms</button>
      </div>
      <div class="edit-section ${editMode?'on':''}" id="edit-form">
        <div class="fg">
          <div class="fgi"><label class="fgl">Monthly Rent</label>    <input class="fginput" id="e-rent"   type="number" value="${agr.monthlyRent}"></div>
          <div class="fgi"><label class="fgl">Security Deposit</label><input class="fginput" id="e-sec"    type="number" value="${agr.securityDeposit}"></div>
          <div class="fgi"><label class="fgl">Advance Months</label>  <input class="fginput" id="e-adv"    type="number" value="${agr.advanceMonths}" min="1" max="6"></div>
          <div class="fgi"><label class="fgl">Duration (months)</label><input class="fginput" id="e-dur"   type="number" value="${agr.durationMonths}"></div>
          <div class="fgi"><label class="fgl">Start Date</label>      <input class="fginput" id="e-start"  type="date"   value="${agr.startDate.slice(0,10)}"></div>
          <div class="fgi"><label class="fgl">End Date</label>        <input class="fginput" id="e-end"    type="date"   value="${agr.endDate.slice(0,10)}"></div>
          <div class="fgi"><label class="fgl">Notice Period (days)</label><input class="fginput" id="e-notice" type="number" value="${agr.noticePeriodDays}"></div>
        </div>
        <div class="fchecks">
          <label class="fcheck"><input type="checkbox" id="e-util"  ${agr.utilitiesIncluded ?'checked':''}> Utilities Included</label>
          <label class="fcheck"><input type="checkbox" id="e-maint" ${agr.maintenanceByOwner?'checked':''}> Maintenance by Owner</label>
          <label class="fcheck"><input type="checkbox" id="e-pets"  ${agr.petsAllowed       ?'checked':''}> Pets Allowed</label>
        </div>
        <div class="fgi" style="margin-bottom:14px">
          <label class="fgl">Additional Terms</label>
          <textarea class="fginput" id="e-terms" style="min-height:60px">${agr.additionalTerms}</textarea>
        </div>
        <div style="display:flex;gap:10px">
          <button onclick="saveEdit()" class="btn-sign">Save</button>
          <button onclick="toggleEdit()" class="btn-edit">Cancel</button>
        </div>
      </div>` : ''}
    </div>

    <!-- DURATION -->
    <div class="section">
      <div class="sec-title"><div class="sec-num">2</div> Duration & Notice</div>
      <div class="terms-grid">
        <div class="ti"><div class="tl">Duration</div>       <div class="tv">${agr.durationMonths} months</div></div>
        <div class="ti"><div class="tl">Start Date</div>     <div class="tv">${new Date(agr.startDate).toLocaleDateString('en-PK')}</div></div>
        <div class="ti"><div class="tl">End Date</div>       <div class="tv">${new Date(agr.endDate).toLocaleDateString('en-PK')}</div></div>
        <div class="ti"><div class="tl">Notice Period</div>  <div class="tv">${agr.noticePeriodDays} days</div></div>
      </div>
    </div>

    <!-- CONDITIONS -->
    <div class="section">
      <div class="sec-title"><div class="sec-num">3</div> Conditions</div>
      <div class="bool-row"><span>Utilities Included</span>   <span class="chip ${agr.utilitiesIncluded ?'y':'n'}">${agr.utilitiesIncluded ?'Yes':'No'}</span></div>
      <div class="bool-row"><span>Maintenance by Owner</span> <span class="chip ${agr.maintenanceByOwner?'y':'n'}">${agr.maintenanceByOwner?'Yes':'No'}</span></div>
      <div class="bool-row"><span>Pets Allowed</span>         <span class="chip ${agr.petsAllowed       ?'y':'n'}">${agr.petsAllowed       ?'Yes':'No'}</span></div>
      ${agr.additionalTerms?`<div style="padding:10px 0;color:var(--muted);font-size:0.84rem"><strong style="color:var(--text)">Additional Terms:</strong> ${agr.additionalTerms}</div>`:''}
    </div>

    <!-- SIGN ACTION -->
    ${!isActive ? `
    <div class="action-bar">
      <div class="action-left">
        <strong>${mySigned?'✅ Aap ne sign kar diya':'✍️ Signature Required'}</strong>
        <p>${mySigned?'Doosre party ka intezaar hai.':'Agreement tamam terms parh ke sign karein.'}</p>
      </div>
      <div class="abtns">
        ${!mySigned?`<button class="btn-sign" onclick="doSign()">✍️ Sign Agreement</button>`:''}
      </div>
    </div>` : ''}

    <!-- PAYMENT SECTION (dono sign ke baad, sirf tenant ke liye) -->
    ${bothSigned && !isActive && role==='tenant' ? renderPaymentSection() : ''}

    <!-- OWNER VERIFY SECTION -->
    ${bothSigned && !isActive && role==='owner' && spay ? renderVerifySection() : ''}

    <!-- ACTIVE STATE -->
    ${isActive ? `
    <div class="action-bar green-bg">
      <div class="action-left">
        <strong style="color:var(--green)">✅ Agreement Active</strong>
        <p>Contract ${new Date(agr.startDate).toLocaleDateString('en-PK')} se ${new Date(agr.endDate).toLocaleDateString('en-PK')} tak valid hai.</p>
      </div>
      ${role==='tenant'?`<div class="abtns"><button class="btn-sign" onclick="location.href='my_rental.html'">🏡 My Rental →</button></div>`:''}
    </div>` : ''}
  `;
}

function renderPaymentSection(){
  const totalDue = agr.securityDeposit + agr.monthlyRent * agr.advanceMonths;

  if(!spay){
    return `
    <div class="pay-box">
      <h3>💳 Security Deposit Payment</h3>
      <p>Dono parties ne sign kar liya! Ab security deposit + advance submit karein. Owner verify karega aur agreement active ho jayegi.</p>
      <div class="pay-amount-box">
        <div><div class="lbl">Total Amount Due</div><div class="val">PKR ${totalDue.toLocaleString()}</div></div>
        <div style="text-align:right;font-size:0.78rem;color:var(--muted)">
          Security: PKR ${agr.securityDeposit.toLocaleString()}<br>
          Advance (${agr.advanceMonths}mo): PKR ${(agr.monthlyRent*agr.advanceMonths).toLocaleString()}
        </div>
      </div>
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:10px">EasyPaisa/JazzCash/Bank transfer karein aur Transaction ID yahan enter karein:</p>
      <div class="pay-input-row">
        <input class="pay-input" id="txn-id" placeholder="Transaction ID (e.g. TXN123456789)">
        <button class="btn-pay" onclick="submitPayment()">Submit Payment</button>
      </div>
    </div>`;
  }

  const statusMap = {
    PENDING_VERIFICATION: { cls:'pending',  icon:'⏳', title:'Verification Pending',  sub:'Owner verify kar raha hai. Thodi der wait karein.' },
    VERIFIED:             { cls:'verified', icon:'✅', title:'Payment Verified!',      sub:'Owner ne confirm kar diya. Agreement active ho gayi.' },
    REJECTED:             { cls:'rejected', icon:'❌', title:'Payment Rejected',       sub: spay.rejectedReason || 'Transaction ID sahi nahi tha.' },
  };
  const s = statusMap[spay.status];

  return `
  <div class="pay-box">
    <h3>💳 Security Deposit Payment</h3>
    <div class="pay-status ${s.cls}">
      <div class="pay-status-icon">${s.icon}</div>
      <div class="pay-status-text">
        <strong>${s.title}</strong>
        <span>${s.sub}</span>
      </div>
    </div>
    <div style="margin-top:14px;font-size:0.83rem;color:var(--muted)">
      Transaction ID: <strong style="color:var(--text)">${spay.transactionId}</strong> &nbsp;·&nbsp;
      Amount: <strong>PKR ${spay.amount.toLocaleString()}</strong>
    </div>
    ${spay.status==='REJECTED' ? `
    <div style="margin-top:16px">
      <p style="font-size:0.83rem;color:var(--muted);margin-bottom:10px">Dobara submit karein:</p>
      <div class="pay-input-row">
        <input class="pay-input" id="txn-id" placeholder="Naya Transaction ID">
        <button class="btn-pay" onclick="submitPayment()">Re-Submit</button>
      </div>
    </div>` : ''}
  </div>`;
}

function renderVerifySection(){
  if(spay.status === 'VERIFIED') return '';

  return `
  <div class="verify-box">
    <h3>🔍 Payment Verification</h3>
    <p style="font-size:0.85rem;color:#92400e;margin-bottom:14px">Tenant ne security deposit submit ki hai. Verify karein:</p>
    <div class="verify-info">
      <div class="vi-row"><span class="vi-lbl">Transaction ID</span><span class="vi-val">${spay.transactionId}</span></div>
      <div class="vi-row"><span class="vi-lbl">Amount</span>        <span class="vi-val">PKR ${spay.amount.toLocaleString()}</span></div>
      <div class="vi-row"><span class="vi-lbl">Submitted At</span>  <span class="vi-val">${new Date(spay.submittedAt).toLocaleString('en-PK')}</span></div>
    </div>
    <input class="reject-input" id="reject-reason" placeholder="Rejection reason (agar reject kar rahe hain)..." id="reject-input">
    <div class="verify-btns">
      <button class="btn-verify" onclick="verifyPayment('verify')">✅ Verify — Activate Agreement</button>
      <button class="btn-reject" onclick="showRejectInput()">❌ Reject</button>
    </div>
    <button id="confirm-reject-btn" style="display:none;margin-top:10px;width:100%;padding:10px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit" onclick="verifyPayment('reject')">Confirm Rejection</button>
  </div>`;
}

function showRejectInput(){
  const ri = document.getElementById('reject-reason');
  const cb = document.getElementById('confirm-reject-btn');
  if(ri){ ri.classList.add('on'); ri.focus(); }
  if(cb) cb.style.display = 'block';
}

/* ── ACTIONS ───────────────────────────────────────── */
async function doSign(){
  if(!confirm('Agreement ki tamam terms parh li hain? Sign karna chahte hain?')) return;
  try{
    const d = await apiFetch(`/user/agreement/${agr.id}/sign`,{method:'PUT'});
    if(d.success){ agr=d.data; showToast(d.message); await reloadAgreement(); }
    else showToast(d.message||'Sign fail.','error');
  } catch{ showToast('Network error.','error'); }
}

async function saveEdit(){
  try{
    const d = await apiFetch(`/user/agreement/${agr.id}`,{
      method:'PUT',
      body: JSON.stringify({
        monthlyRent:       document.getElementById('e-rent').value,
        securityDeposit:   document.getElementById('e-sec').value,
        advanceMonths:     document.getElementById('e-adv').value,
        durationMonths:    document.getElementById('e-dur').value,
        startDate:         document.getElementById('e-start').value,
        endDate:           document.getElementById('e-end').value,
        noticePeriodDays:  document.getElementById('e-notice').value,
        utilitiesIncluded: document.getElementById('e-util').checked,
        maintenanceByOwner:document.getElementById('e-maint').checked,
        petsAllowed:       document.getElementById('e-pets').checked,
        additionalTerms:   document.getElementById('e-terms').value,
      })
    });
    if(d.success){ agr=d.data; editMode=false; showToast('Update ho gaya!'); render(); }
    else showToast(d.message||'Update fail.','error');
  } catch{ showToast('Network error.','error'); }
}

function toggleEdit(){ editMode=!editMode; render(); }

async function submitPayment(){
  const txnId = document.getElementById('txn-id')?.value?.trim();
  if(!txnId){ showToast('Transaction ID darj karein.','error'); return; }
  const totalDue = agr.securityDeposit + agr.monthlyRent * agr.advanceMonths;
  try{
    const d = await apiFetch(`/user/agreement/${agr.id}/pay`,{
      method:'POST',
      body: JSON.stringify({ transactionId: txnId, amount: totalDue })
    });
    if(d.success){ spay=d.data; showToast(d.message); render(); }
    else showToast(d.message||'Payment submit fail.','error');
  } catch{ showToast('Network error.','error'); }
}

async function verifyPayment(action){
  const reason = document.getElementById('reject-reason')?.value?.trim() || '';
  if(action==='reject' && !reason){ showToast('Rejection reason likhein.','error'); return; }
  if(!confirm(action==='verify'?'Payment verify karein aur agreement activate karein?':'Payment reject karein?')) return;
  try{
    const d = await apiFetch(`/user/agreement/${agr.id}/verify`,{
      method:'PUT',
      body: JSON.stringify({ action, rejectedReason: reason })
    });
    if(d.success){ showToast(d.message); await reloadAgreement(); }
    else showToast(d.message||'Error.','error');
  } catch{ showToast('Network error.','error'); }
}

async function reloadAgreement(){
  const listingId = new URLSearchParams(window.location.search).get('listing');
  await loadAgreement(listingId);
}

function showErr(msg){
  document.getElementById('main-content').innerHTML=`
    <div class="err-box">
      <h3>Error</h3><p>${msg}</p>
      <a href="my_requests.html" style="color:var(--green);font-weight:700;display:inline-block;margin-top:10px">← Wapas Jao</a>
    </div>`;
}
</script>
<script>
  (function(){
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebar-overlay');
    var toggle  = document.getElementById('menu-toggle');
    if (!sidebar || !overlay || !toggle) return;
    toggle.onclick  = function(){ sidebar.classList.add('active');    overlay.classList.add('active'); };
    overlay.onclick = function(){ sidebar.classList.remove('active'); overlay.classList.remove('active'); };
  })();
</script>
</body>
</html>
